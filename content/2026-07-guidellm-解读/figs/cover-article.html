<!doctype html>
<html lang="zh" data-theme="dark"><head><meta charset="utf-8">
<style>
:root{ --ink:#eef1f7; --ink2:#c2c9d6; --ink3:#8b94a4; --ink4:#5e6677;
  --violet:#9d8bff; --cyan:#2bc4e6; --amber:#f0a93b;
  --font:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,-apple-system,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,monospace; }
*{box-sizing:border-box;margin:0;padding:0}
#cover{width:1080px;height:460px;position:relative;overflow:hidden;font-family:var(--font);color:var(--ink);
  display:flex;flex-direction:column;justify-content:center;padding:0 66px;
  background:
    radial-gradient(760px 460px at 88% -20%, rgba(157,139,255,.28), transparent 62%),
    radial-gradient(680px 460px at 6% 120%, rgba(240,169,59,.16), transparent 60%),
    linear-gradient(150deg,#0e131d 0%, #0a0d14 88%)}
.grid{position:absolute;inset:0;background-image:
  linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:56px 56px}
.mid{position:relative}
.eyebrow{display:inline-flex;align-items:center;gap:11px;font-size:20px;font-weight:800;color:var(--violet);
  letter-spacing:.03em;background:rgba(157,139,255,.1);border:1px solid rgba(157,139,255,.32);
  border-radius:999px;padding:9px 22px}
.eyebrow .d{width:10px;height:10px;border-radius:6px;background:var(--violet);box-shadow:0 0 14px var(--violet)}
.title{margin-top:22px;font-size:62px;font-weight:900;line-height:1.12;letter-spacing:-2px}
.title .hl{background:linear-gradient(100deg,#9d8bff,#2bc4e6);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{margin-top:20px;font-size:27px;font-weight:650;color:var(--ink2)}
.sub b{color:var(--amber);font-weight:800}
.pills{margin-top:20px;display:flex;gap:11px}
.pill{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--amber);
  background:rgba(240,169,59,.1);border:1px solid rgba(240,169,59,.34);border-radius:10px;padding:7px 15px}
.brand{position:absolute;right:66px;bottom:28px;font-size:19px;color:var(--ink4);font-weight:650}
.brand b{color:var(--ink3)}
</style></head>
<body>
<section id="cover">
  <div class="grid"></div>
  <div class="mid">
    <div class="eyebrow"><span class="d"></span>私有化部署大模型服务 · 性能测试工具篇 4</div>
    <div class="title">私有化小模型 <span class="hl">快速摸底</span></div>
    <div class="sub"><b>带你熟悉压测工具 GuideLLM</b> · 报 goodput,别报裸峰值</div>
    <div class="pills"><span class="pill">延迟-吞吐曲线</span><span class="pill">goodput 拐点</span><span class="pill">国产卡 vs A100</span><span class="pill">找瓶颈</span></div>
  </div>
  <div class="brand"><b>ModelDoctor</b> · mcpinfra.net · github.com/weetime</div>
</section>
</body></html>
