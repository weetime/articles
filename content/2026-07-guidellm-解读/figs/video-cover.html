<!doctype html>
<html lang="zh" data-theme="dark"><head><meta charset="utf-8">
<style>
:root{
  --ink:#eef1f7; --ink2:#c2c9d6; --ink3:#8b94a4; --ink4:#5e6677;
  --violet:#9d8bff; --cyan:#2bc4e6; --amber:#f0a93b; --rose:#ff5d7a; --green:#3ddc84;
  --font:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,-apple-system,sans-serif;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
#cover{width:1080px;height:1920px;position:relative;overflow:hidden;font-family:var(--font);color:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 92px;
  background:
    radial-gradient(1100px 720px at 84% -8%, rgba(157,139,255,.26), transparent 60%),
    radial-gradient(1000px 720px at 12% 108%, rgba(240,169,59,.16), transparent 60%),
    linear-gradient(158deg,#0e131d 0%, #0a0d14 86%)}
.grid{position:absolute;inset:0;background-image:
  linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);background-size:64px 64px}
.mid{position:relative;display:flex;flex-direction:column;align-items:center;width:100%}

.eyebrow{display:inline-flex;align-items:center;gap:16px;
  font-size:33px;font-weight:800;color:var(--violet);letter-spacing:.04em;
  background:rgba(157,139,255,.1);border:1px solid rgba(157,139,255,.32);border-radius:999px;padding:17px 38px}
.eyebrow .d{width:16px;height:16px;border-radius:9px;background:var(--violet);box-shadow:0 0 20px var(--violet)}

.kicker{margin-top:62px;font-size:44px;font-weight:800;color:var(--ink2);letter-spacing:.01em}
.kicker b{font-family:var(--mono);color:var(--ink);font-weight:800}
.title{margin-top:30px;font-size:112px;font-weight:900;line-height:1.12;letter-spacing:-3px}
.title .hl{background:linear-gradient(100deg,#9d8bff,#2bc4e6);-webkit-background-clip:text;background-clip:text;color:transparent}

.sub{margin-top:52px;font-size:42px;font-weight:680;color:var(--ink2);line-height:1.5}
.sub b{color:var(--amber);font-weight:800}

/* rate-type pills */
.pills{margin-top:44px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.pill{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--amber);
  background:rgba(240,169,59,.1);border:1px solid rgba(240,169,59,.34);border-radius:14px;padding:12px 24px}

/* stat band — the punchline */
.stats{margin-top:60px;display:flex;gap:28px;width:100%;justify-content:center}
.stat{flex:1;max-width:400px;background:rgba(19,23,32,.66);border:1px solid rgba(150,163,196,.18);
  border-radius:24px;padding:34px 22px 30px}
.stat .k{font-size:30px;color:var(--ink3);font-weight:700;letter-spacing:.02em}
.stat .v{margin-top:14px;font-family:var(--mono);font-size:58px;font-weight:800;line-height:1.05;letter-spacing:-1px}
.stat .v .ar{color:var(--ink4);font-weight:600}
.stat .x{margin-top:10px;font-size:34px;font-weight:800}
.stat.up .v .b{color:var(--cyan)} .stat.up .x{color:var(--cyan)}
.stat.dn .v .b{color:var(--rose)} .stat.dn .x{color:var(--rose)}

.chips{margin-top:58px;font-size:35px;color:var(--ink3);font-weight:650;letter-spacing:.02em;line-height:1.6}
.chips b{color:var(--ink2)}
.brand{margin-top:52px;font-size:31px;color:var(--ink4);font-weight:650;letter-spacing:.02em}
.brand b{color:var(--ink3)}
</style></head>
<body>
<section id="cover">
  <div class="grid"></div>
  <div class="mid">
    <div class="eyebrow"><span class="d"></span>私有化部署大模型服务 · 性能测试工具篇 4</div>
    <div class="kicker">用 <b>guidellm</b> 压一个真实端点</div>
    <div class="title">你怎么压<br><span class="hl">决定你报什么数</span></div>
    <div class="sub"><b>rate-type 家族</b> · 同一个端点,四种施压方式</div>
    <div class="pills"><span class="pill">synchronous</span><span class="pill">throughput</span><span class="pill">constant</span><span class="pill">poisson</span></div>
    <div class="stats">
      <div class="stat up">
        <div class="k">吞吐 req/s</div>
        <div class="v"><span class="b">1.0</span><span class="ar"> → </span><span class="b">38</span></div>
        <div class="x">×37</div>
      </div>
      <div class="stat dn">
        <div class="k">p95 延迟</div>
        <div class="v"><span class="b">1.0s</span><span class="ar"> → </span><span class="b">6.4s</span></div>
        <div class="x">×6</div>
      </div>
    </div>
    <div class="chips">容量曲线 · 拐点 · 打满过头会掉 <b>·</b> A100 单卡 · Qwen2.5-0.5B</div>
    <div class="brand"><b>ModelDoctor</b> · mcpinfra.net · github.com/weetime</div>
  </div>
</section>
</body></html>
