<!doctype html><html lang="zh"><head><meta charset="utf-8"><style>
:root{--bg0:#070710;--bg1:#0b0b1c;--pur:#8b7df7;--blu:#46a6ff;--grn:#33d39a;--org:#f5933e;--pnk:#ff5fa2;--rose:#ff5d7a;--tx:#eef0f8;--sub:#9aa1ba;--line:rgba(255,255,255,.12)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px}
.pg{width:1080px;height:1920px;position:relative;overflow:hidden;padding:150px 78px 200px;
  background:radial-gradient(820px 620px at 18% 6%,rgba(255,93,122,.20),transparent 60%),radial-gradient(760px 560px at 88% 96%,rgba(139,125,247,.20),transparent 62%),linear-gradient(165deg,var(--bg0),var(--bg1) 55%,#08081a);
  color:var(--tx);font-family:"PingFang SC","Microsoft YaHei","Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;justify-content:center}
.pg::before{content:"";position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:56px 56px;mask:radial-gradient(820px 700px at 50% 42%,#000,transparent 82%)}
.z{position:relative;z-index:1}
.eye{align-self:center;display:inline-flex;align-items:center;gap:13px;font-size:30px;font-weight:800;color:var(--rose);border:1px solid #ff5d7a66;background:rgba(255,93,122,.10);padding:15px 32px;border-radius:999px}
.eye .d{width:13px;height:13px;border-radius:50%;background:var(--rose);box-shadow:0 0 18px #ff5d7a}
.h1{margin-top:56px;font-size:82px;font-weight:850;letter-spacing:-2px;line-height:1.14}
.h1 .dim{color:var(--sub);font-weight:800}
.big{margin-top:30px;font-size:150px;font-weight:900;letter-spacing:-4px;line-height:1}
.big .g{background:linear-gradient(96deg,#4ae88f,#7bb8ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.big2{margin-top:14px;font-size:150px;font-weight:900;letter-spacing:-4px;line-height:1}
.big2 .r{background:linear-gradient(96deg,#ff8fb0,#ff5d7a);-webkit-background-clip:text;background-clip:text;color:transparent}
.lab{font-size:40px;font-weight:800;color:#cfd4ec;margin-top:6px}
.sub{margin-top:64px;font-size:40px;line-height:1.55;color:var(--sub);font-weight:600}
.sub b{color:#e6e9f6;font-weight:850}.sub .v{color:var(--pur);font-weight:850}
.cta{margin-top:auto;display:flex;align-items:center;gap:16px;font-size:38px;font-weight:850;color:var(--grn)}
.cta .n{font-size:26px;color:#6b7192;font-family:ui-monospace,monospace;margin-left:auto;font-weight:700}
</style></head><body>
<div class="pg">
  <div class="eye z"><span class="d"></span>实测 · 别再手搓部署命令</div>
  <div class="h1 z">同一台昇腾卡,<span class="dim">只换一个引擎</span></div>
  <div class="big z">吞吐差 <span class="g">2.2×</span></div>
  <div class="big2 z">首字延迟差 <span class="r">20×</span></div>
  <div class="sub z">上百个大模型 × 全硬件的<b>部署配方</b> —— 选型 → 配硬件 → <span class="v">复制能直接跑的命令</span>,别人踩过的坑,你照抄就行。</div>
  <div class="cta z">↓ 60 秒,带你把这个站用一遍<span class="n">recipes.mcpinfra.net</span></div>
</div>
</body></html>
