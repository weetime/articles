<!doctype html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="style-dark.css">
<style>
  .cover{
    width:1080px; height:460px; position:relative; overflow:hidden;
    display:flex; align-items:center; gap:40px;
    background:
      radial-gradient(760px 460px at 82% -20%, #6d4bff30, transparent 60%),
      radial-gradient(620px 420px at 2% 120%, #2dd4ee16, transparent 60%),
      linear-gradient(150deg, #100e20 0%, #08070f 62%);
    padding:0 60px;
  }
  .cover::before{content:"";position:absolute;inset:0;opacity:.5;pointer-events:none;
    background-image:linear-gradient(#ffffff06 1px,transparent 1px),linear-gradient(90deg,#ffffff06 1px,transparent 1px);
    background-size:54px 54px}
  .cover>*{position:relative;z-index:1}
  .cl{flex:1.55}
  .cl .eb{display:flex;align-items:center;gap:11px;font-size:20px;font-weight:700;color:var(--violet2);letter-spacing:.3px}
  .cl .eb .dot{width:9px;height:9px;border-radius:50%;background:var(--violet);box-shadow:0 0 14px var(--violet)}
  .cl h1{font-size:78px;line-height:1.02;font-weight:850;letter-spacing:-2px;margin-top:16px;color:var(--ink)}
  .cl .ac{font-size:30px;font-weight:800;margin-top:18px;letter-spacing:-.5px;color:var(--ink2)}
  .cl .ac .hi{background:linear-gradient(100deg,var(--violet2),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
  .cl .sm{font-size:19px;color:var(--ink3);margin-top:14px;font-weight:600}
  .cr{width:300px;display:flex;flex-direction:column;gap:16px}
  .tile{background:linear-gradient(180deg,#1c1b33,#141327);border:1px solid var(--line2);border-radius:18px;padding:20px 22px;position:relative;overflow:hidden}
  .tile .bar{position:absolute;left:0;top:0;height:100%;width:5px}
  .tile .lab{font-size:17px;color:var(--ink3);font-weight:600}
  .tile .big{font-size:44px;font-weight:850;line-height:1;margin-top:8px;letter-spacing:-1px}
  .tile .sub{font-size:15px;color:var(--ink3);margin-top:8px;font-weight:600}
  .big.vi{background:linear-gradient(100deg,var(--violet2),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
  .big.rose{color:var(--rose)}
</style></head><body>
<div class="cover">
  <div class="cl">
    <div class="eb"><span class="dot"></span>ModelDoctor · 推理评测方法论</div>
    <h1>大模型推理评测</h1>
    <div class="ac">从「跑分幻觉」到<span class="hi">「场景验收」</span></div>
    <div class="sm">五场景五测法 · Agent Pass^k · 国产卡 DeepSeek-V4-Flash 实测</div>
  </div>
  <div class="cr">
    <div class="tile"><span class="bar" style="background:var(--violet)"></span><div class="lab">该看的是有效吞吐</div><div class="big vi">goodput ≠ 峰值</div></div>
    <div class="tile"><span class="bar" style="background:var(--rose)"></span><div class="lab">Agent 实测 · 单次看着 85.7%</div><div class="big rose">Pass⁴ 67%</div></div>
  </div>
</div>
</body></html>
