<!doctype html>
<html lang="zh"><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{ --bg:#0b0b16; --bg2:#12121f; --card:#161628; --line:rgba(255,255,255,.08);
         --ink:#eef0f8; --sub:#9aa0b8; --dim:#6b7090; --star:#f5b942; --stardim:#3a3a4d; }
  html,body{ background:#07070e; font-family:"Hiragino Sans GB","PingFang SC",-apple-system,"Microsoft YaHei",sans-serif; -webkit-font-smoothing:antialiased; }
  .slide{ width:1080px; background:linear-gradient(170deg,#0d0d1c 0%,#0a0a14 100%); padding:64px 60px 52px; color:#eef0f8; position:relative; overflow:hidden; }
  .slide::before{ content:""; position:absolute; top:-160px; right:-160px; width:520px; height:520px; border-radius:50%; opacity:.16; filter:blur(30px); background:var(--acc); }
  .brandtop{ font-size:22px; font-weight:700; letter-spacing:3px; color:var(--acc); margin-bottom:18px; display:flex; align-items:center; gap:14px; }
  .brandtop .idx{ margin-left:auto; font-size:20px; color:#5a5f7a; letter-spacing:1px; font-weight:600; }
  .h1{ font-size:56px; font-weight:800; letter-spacing:.5px; line-height:1.15; margin-bottom:16px; }
  .h1 .chip{ display:inline-block; vertical-align:middle; font-size:22px; font-weight:700; color:#0a0a14; background:var(--acc); border-radius:10px; padding:6px 16px; margin-left:16px; letter-spacing:1px; }
  .sub{ font-size:25px; color:#aab0c8; line-height:1.6; margin-bottom:36px; font-weight:500; }
  .sub b{ color:#eef0f8; font-weight:700; }
  .rule{ height:2px; background:linear-gradient(90deg,var(--acc),transparent); margin:0 0 34px; border-radius:2px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:20px; padding:26px 30px; margin-bottom:20px; position:relative; }
  .card.flag{ border:2px solid var(--acc); background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0)); }
  .card .top{ display:flex; align-items:center; gap:16px; }
  .card .nm{ font-size:34px; font-weight:800; letter-spacing:.3px; }
  .card.flag .nm{ color:var(--acc); }
  .card .badge{ font-size:18px; font-weight:700; color:#0a0a14; background:var(--acc); border-radius:8px; padding:3px 12px; }
  .card .stars{ margin-left:auto; font-size:28px; letter-spacing:3px; white-space:nowrap; }
  .card .stars .f{ color:#f5b942; } .card .stars .e{ color:#3a3a4d; }
  .card .url{ font-family:"SF Mono",Menlo,monospace; font-size:20px; color:#7a80a0; margin-top:8px; }
  .card .def{ font-size:26px; color:#cdd2e6; margin-top:14px; line-height:1.5; font-weight:600; }
  .card .rz{ font-size:24px; color:#9aa0b8; margin-top:12px; line-height:1.55; }
  .card .rz b{ color:var(--acc); font-weight:700; }
  .card .note{ font-size:21px; color:#8086a0; margin-top:12px; line-height:1.5; }
  .card .note::before{ content:"⚠ "; color:#e0a03a; }
  .foot{ display:flex; justify-content:space-between; align-items:center; margin-top:34px; padding-top:24px; border-top:1px solid var(--line); font-size:21px; color:#6b7090; }
  .foot b{ color:#aab0c8; }
  /* cover — 正方形 1080×1080,站名星图背景 + 中心强光 + 大标题 */
  .cover{ width:1080px; height:1080px; position:relative; overflow:hidden;
          background:radial-gradient(circle at 50% 44%, #191933 0%, #0c0c1a 58%, #07070f 100%); padding:0; }
  .cover::before{ display:none; }
  .cons{ position:absolute; inset:-30px; display:flex; flex-wrap:wrap; align-content:center; justify-content:center; gap:20px 30px; padding:44px; }
  .cons span{ font-size:29px; font-weight:800; letter-spacing:.5px; white-space:nowrap; opacity:.17; }
  .scrim{ position:absolute; inset:0; background:radial-gradient(ellipse 66% 50% at 50% 47%, rgba(9,9,18,.94) 26%, rgba(9,9,18,.72) 52%, rgba(9,9,18,0) 82%); }
  .glow{ position:absolute; left:50%; top:47%; width:900px; height:640px; transform:translate(-50%,-50%);
         background:radial-gradient(ellipse at center, rgba(124,110,247,.36), rgba(56,189,248,.16) 45%, transparent 70%); filter:blur(24px); }
  .center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:64px; }
  .center .kick{ font-size:27px; font-weight:800; letter-spacing:8px; color:#a99bff; margin-bottom:26px; }
  .center .big{ font-size:132px; font-weight:900; line-height:1.04; letter-spacing:3px;
                background:linear-gradient(100deg,#b3a6ff 0%,#8b7df7 22%,#38bdf8 60%,#4ade80 100%);
                -webkit-background-clip:text; background-clip:text; color:transparent;
                filter:drop-shadow(0 6px 30px rgba(124,110,247,.5)); }
  .center .stat{ margin-top:40px; font-size:46px; font-weight:900; color:#fff; letter-spacing:1px; }
  .center .stat b{ background:linear-gradient(90deg,#8b7df7,#38bdf8); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .center .csub{ margin-top:20px; font-size:29px; color:#c2c7dc; font-weight:600; letter-spacing:.5px; }
  .center .divider{ width:120px; height:4px; border-radius:3px; margin:34px 0 26px;
                    background:linear-gradient(90deg,#8b7df7,#38bdf8,#4ade80); }
  .center .legend2{ font-size:25px; color:#9aa0c0; }
  .center .legend2 .s{ color:#f5b942; }
  .center .brandline{ position:absolute; bottom:56px; font-size:24px; color:#7a7fa0; letter-spacing:1px; }
  .center .brandline b{ color:#b6bbd8; }
</style></head>
<body><div id="app"></div>
<script>
const S = (n)=>`<span class="stars">${'<span class="f">★</span>'.repeat(n)}${'<span class="e">★</span>'.repeat(5-n)}</span>`;

 {t:"综合榜单 / 竞技场", acc:"#8b7df7", idx:"01 / 09",

   ["FlagEval 天秤","flageval.baai.ac.cn",3,"智源开放评测,多模态多语言","关注多模态基础模型评测时参考"],

   ["LLM-Stats","llm-stats.com",4,"智能/速度/价格合成综合分,300+ 模型","首页卡片一眼获取各维度领先者",{note:"数据含未发布 preview 模型,需区分"}],

   ["BFCL","gorilla.cs.berkeley.edu",4,"工具/函数调用评测(V4)","Agent 工具调用主要参考"],
   ["tau-bench","github.com/sierra-research/tau-bench",4,"多轮+用户模拟的任务型 Agent","补 SWE-bench 覆盖不到的对话场景"],
   ["LiveBench / Context Arena","",4,"抗污染动态榜 / 长上下文有效性","验证防污染与「标称≠有效」"],

  sub:"跟踪新模型发布节奏,避免遗漏,替代碎片化的社交媒体信息。",
  items:[
   ["AI Release Tracker","aireleasetracker.com",4,"ChatGPT 至今全模型发布时间线","免费无广告的完整时间线",{flag:1,note:"所列跑分多为厂商自报,不作能力裁判"}],

   ["OpenRouter","openrouter.ai",5,"OpenAI 兼容统一入口,聚合 400+ 模型","独家真实 token 用量榜,反映生产采用度",{flag:1,note:"用量为自身平台流量,勿过度外推"}],

   ["Hugging Face","huggingface.co",5,"200 万+ 模型库 + 数据集 + Spaces","开源工作流的默认起点,众多榜单宿主",{flag:1}],

 {t:"部署 · 推理引擎与配方", acc:"#38bdf8", idx:"08 / 09", hero:1,
  sub:"把模型在自有硬件上稳定 serve、控延迟与成本,是落地核心,<b>本文着墨最多的一类</b>。",
  items:[
   ["recipes.vllm.ai · recipes.mcpinfra.net","",5,"按「模型×GPU」给可复制 serve 命令","开箱即用,覆盖主流卡与量化;后者兼给 vLLM+SGLang",{flag:1}],
   ["vLLM · SGLang","docs.vllm.ai · docs.sglang.io",5,"高吞吐推理引擎 / RadixAttention","开源推理服务的事实标准与前缀复用利器"],
   ["TensorRT-LLM · Dynamo · llm-d","",4,"NVIDIA 优化 / 分离式编排 / K8s 路由","从单机到数据中心级的推理编排"],
   ["MindIE / vllm-ascend","hiascend.com",4,"昇腾 910B 部署主力路径","信创/国产卡绕不开;需按昇腾重测吞吐显存算子",{flag:1}],
   ["production-stack · MLPerf","",4,"K8s 生产参考栈 / 硬件推理基准","走向生产集群的参考架构与权威数字"],
  ]},
 {t:"趋势 / 研究数据", acc:"#c4a877", idx:"09 / 09",
  sub:"宏观视角与对外汇报,提供可引用的行业数据。",
  items:[
   ["Epoch AI","epoch.ai/trends",5,"前沿 AI 增长趋势仪表盘 + 数据库","成本/上下文/算力等可引用量级趋势",{flag:1,note:"带定义前提的量级估算,勿当精确值"}],
   ["Stanford HAI AI Index","hai.stanford.edu/ai-index",4,"年度权威报告(2026 版)","技术/投资/治理系统性数据,适合汇报"],
   ["a16z LLMflation","a16z.com",3,"推理成本下降的经典论述","阐述成本趋势的常引用源(2024.11 旧文)"],
  ]},
];

function cardHTML(it){
  const [nm,url,st,def,rz,opt={}] = it;
  return `<div class="card${opt.flag?' flag':''}">
    <div class="top"><div class="nm">${nm}</div>${opt.flag?'<div class="badge">旗舰</div>':''}${S(st)}</div>
    ${url?`<div class="url">${url}</div>`:''}
    <div class="def">${def}</div>
    <div class="rz"><b>上榜理由 · </b>${rz}</div>
    ${opt.note?`<div class="note">${opt.note}</div>`:''}
  </div>`;
}
// 站名星图:拆分所有站点名(去重),按类主题色低透明度铺底
const NAMES=[];
CATS.forEach(c=>c.items.forEach(it=>{
  it[0].split(/\s·\s|\s\/\s|·|\//).map(s=>s.trim()).filter(s=>s && s.length<=22).forEach(n=>NAMES.push([n,c.acc]));
}));
const seen=new Set(); const uniq=NAMES.filter(([n])=>{ if(seen.has(n))return false; seen.add(n); return true; });
const tiled=[...uniq,...uniq].map(([n,c],i)=>`<span style="color:${c}">${n}</span>`).join('');

let html = `<div class="slide cover">
  <div class="cons">${tiled}</div>
  <div class="glow"></div>
  <div class="scrim"></div>
  <div class="center">
    <div class="kick">大 模 型 生 态</div>
    <div class="big">网站全景盘点</div>
    <div class="stat"><b>9 大类</b> · <b>50+ 站点</b></div>
    <div class="csub">看榜 · 选型 · 拿模型 · 部署 · 趋势</div>
    <div class="divider"></div>
    <div class="legend2"><span class="s">★</span> 每站附客观定位 · 上榜理由 · 推荐指数</div>
    <div class="brandline"><b>vLLM 生产工程</b> · recipes.mcpinfra.net · ModelDoctor</div>
  </div>
</div>`;

for(const c of CATS){
  html += `<div class="slide" style="--acc:${c.acc}">
    <div class="brandtop">大模型网站全景<span class="idx">${c.idx}</span></div>
    <div class="h1">${c.t}${c.hero?'<span class="chip">主场</span>':''}</div>
    <div class="sub">${c.sub}</div>
    <div class="rule"></div>
    ${c.items.map(cardHTML).join('')}
    <div class="foot"><div><b>推荐指数</b> ★ = 权威性 × 不可替代性</div><div>recipes.mcpinfra.net · ModelDoctor · 2026.07</div></div>
  </div>`;
}
document.getElementById('app').innerHTML = html;
</script></body></html>
